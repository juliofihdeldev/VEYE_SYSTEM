# Supabase local / CLI config — see https://supabase.com/docs/guides/cli/config
# Run `supabase link` against your hosted project when ready.

project_id = "veye-system"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.migrations]
enabled = true
schema_paths = []

[db.seed]
enabled = false
sql_paths = []

[studio]
enabled = true
port = 54323

[auth]
enabled = true
enable_anonymous_sign_ins = true
# Vite default; add your production dashboard URL in hosted project (Auth → URL configuration).
site_url = "http://127.0.0.1:5173"
additional_redirect_urls = [
  "https://127.0.0.1:5173",
  "http://localhost:5173",
  "http://127.0.0.1:5173/auth/reset",
  "http://localhost:5173/auth/reset",
]

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[edge_runtime]
enabled = true
policy = "per_worker"
inspector_port = 8083
deno_version = 2

# Called from mobile / dashboard with shared secrets — not Supabase JWT (until Auth migration)
# Use [functions.<slug>] (dotted table headers). Quoted headers like ["functions.name"] are a
# single top-level table name and break CLI defaults — Edge runtime gets SUPABASE_INTERNAL_FUNCTIONS_CONFIG={}.
[functions.telegram-monitor]
verify_jwt = false

[functions.process-global-alert]
verify_jwt = false

[functions.process-demanti]
verify_jwt = false

[functions.process-user-merge]
verify_jwt = false

[functions.get-user-moderation]
verify_jwt = false

[functions.process-veye-comment]
verify_jwt = false

[functions.process-admin-alert]
verify_jwt = false

[functions.unblock-user]
verify_jwt = false

[functions.send-notification]
verify_jwt = false

[functions.health-check]
verify_jwt = false

[functions.dashboard-mutate]
verify_jwt = false
