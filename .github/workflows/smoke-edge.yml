# Step 5 — Manual smoke of Edge functions (run from Actions tab → "Smoke Edge functions" → Run workflow).
#
# Role-gated Edge Functions (`telegram-monitor`, `dashboard-mutate`, `unblock-user`,
# `process-admin-alert`) require an admin caller. `requireDashboardRole` accepts a
# bearer token equal to `SUPABASE_SERVICE_ROLE_KEY` as admin for CI use.
#
# Secrets:
#   SUPABASE_FUNCTIONS_BASE   — e.g. https://<project-ref>.supabase.co/functions/v1  (no trailing slash)
#   SUPABASE_ANON_KEY         — for anonymous-caller endpoints (process-global-alert, get-user-moderation)
#   SUPABASE_SERVICE_ROLE_KEY — for admin endpoints (telegram-monitor, etc.)

name: Smoke Edge functions

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: health-check (GET)
        env:
          BASE: ${{ secrets.SUPABASE_FUNCTIONS_BASE }}
          ANON: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${BASE:-}" ] || [ -z "${ANON:-}" ]; then
            echo "Set SUPABASE_FUNCTIONS_BASE and SUPABASE_ANON_KEY"
            exit 1
          fi
          curl -sfS "${BASE}/health-check" \
            -H "Authorization: Bearer ${ANON}" \
            -w "\nHTTP %{http_code}\n"

      - name: process-global-alert (POST, expect JSON)
        env:
          BASE: ${{ secrets.SUPABASE_FUNCTIONS_BASE }}
          ANON: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          BODY='{"summary":"Smoke test — automated workflow (non-incident).","title":"smoke","userId":"github-actions-smoke","source":"smoke-test"}'
          curl -sfS -X POST "${BASE}/process-global-alert" \
            -H "Authorization: Bearer ${ANON}" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            -w "\nHTTP %{http_code}\n" | head -c 4000
          echo

      - name: get-user-moderation (POST, anonymous caller allowed)
        env:
          BASE: ${{ secrets.SUPABASE_FUNCTIONS_BASE }}
          ANON: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          curl -sfS -X POST "${BASE}/get-user-moderation" \
            -H "Authorization: Bearer ${ANON}" \
            -H "Content-Type: application/json" \
            -d '{"userId":"github-actions-smoke-moderation"}' \
            -w "\nHTTP %{http_code}\n" | head -c 2000
          echo

      - name: telegram-monitor (POST, admin via service-role)
        env:
          BASE: ${{ secrets.SUPABASE_FUNCTIONS_BASE }}
          SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SERVICE_ROLE:-}" ]; then
            echo "Skipping telegram-monitor smoke: SUPABASE_SERVICE_ROLE_KEY not set."
            exit 0
          fi
          curl -sfS -X POST "${BASE}/telegram-monitor" \
            -H "Authorization: Bearer ${SERVICE_ROLE}" \
            -H "apikey: ${SERVICE_ROLE}" \
            -H "Content-Type: application/json" \
            -d '{}' --max-time 120 -w "\nHTTP %{http_code}\n" | head -c 4000
          echo
