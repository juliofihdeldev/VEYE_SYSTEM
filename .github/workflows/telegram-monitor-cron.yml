# Step 4 — Invoke Supabase Edge `telegram-monitor` every 15 minutes (America/Toronto ≈ Haiti-adjacent; adjust if needed).
#
# The function enforces `requireDashboardRole` (see `supabase/functions/_shared/auth.ts`),
# which recognises a bearer token equal to `SUPABASE_SERVICE_ROLE_KEY` as an admin caller.
# That's the pattern used here because scheduled CI has no interactive Supabase session.
#
# Configure repository secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_FUNCTION_TELEGRAM_URL — full URL, e.g. https://<project-ref>.supabase.co/functions/v1/telegram-monitor
#   SUPABASE_SERVICE_ROLE_KEY      — project service-role key (Settings → API — service_role). Treat as a secret.

name: Telegram monitor (15 min)

on:
  schedule:
    # Every 15 minutes (UTC). Change to match Haiti business hours if you prefer.
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: telegram-monitor-cron
  cancel-in-progress: false

jobs:
  invoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: POST telegram-monitor
        env:
          URL: ${{ secrets.SUPABASE_FUNCTION_TELEGRAM_URL }}
          SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${URL:-}" ] || [ -z "${SERVICE_ROLE:-}" ]; then
            echo "Missing SUPABASE_FUNCTION_TELEGRAM_URL or SUPABASE_SERVICE_ROLE_KEY repository secrets."
            exit 1
          fi
          curl -sfS -X POST "$URL" \
            -H "Authorization: Bearer ${SERVICE_ROLE}" \
            -H "apikey: ${SERVICE_ROLE}" \
            -H "Content-Type: application/json" \
            -d '{}' --max-time 120 -D -
          echo
          echo "OK"
